<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="80" viewBox="0 0 1200 80">
  <rect width="1200" height="80" fill="#0A0A0A"/>

  <style>
    @keyframes float { 0% { transform: translateY(0); opacity: 0.3; } 50% { opacity: 0.7; } 100% { transform: translateY(-80px); opacity: 0; } }
    @keyframes drift { 0% { transform: translate(0,0); opacity: 0.2; } 50% { opacity: 0.5; } 100% { transform: translate(15px,-80px); opacity: 0; } }
    @keyframes flicker { 0% { opacity: 0.2; } 50% { opacity: 0.5; } 100% { opacity: 0.2; } }
    .e { animation: float linear infinite; }
    .ed { animation: drift linear infinite; }
    .s { animation: flicker ease-in-out infinite; }
  </style>

  <circle class="e" cx="100" cy="70" r="2" fill="#B20000" style="animation-duration:5s;animation-delay:0s"/>
  <circle class="ed" cx="300" cy="65" r="1.5" fill="#B20000" style="animation-duration:6s;animation-delay:1s"/>
  <circle class="e" cx="500" cy="75" r="2.5" fill="#B20000" style="animation-duration:4.5s;animation-delay:0.5s"/>
  <circle class="ed" cx="700" cy="70" r="1.8" fill="#B20000" style="animation-duration:5.5s;animation-delay:2s"/>
  <circle class="e" cx="900" cy="65" r="2" fill="#B20000" style="animation-duration:6s;animation-delay:1.5s"/>
  <circle class="ed" cx="1100" cy="75" r="2.2" fill="#B20000" style="animation-duration:5s;animation-delay:0.8s"/>
  <circle class="e" cx="200" cy="60" r="1.5" fill="#C5A059" style="animation-duration:7s;animation-delay:2s"/>
  <circle class="ed" cx="600" cy="70" r="1.2" fill="#C5A059" style="animation-duration:5s;animation-delay:3s"/>
  <circle class="e" cx="1000" cy="65" r="1.8" fill="#C5A059" style="animation-duration:6s;animation-delay:1s"/>
  <circle class="s" cx="150" cy="50" r="1" fill="#8E8E8E" style="animation-duration:3s;animation-delay:0s"/>
  <circle class="s" cx="450" cy="55" r="1.2" fill="#8E8E8E" style="animation-duration:4s;animation-delay:1s"/>
  <circle class="s" cx="800" cy="50" r="1" fill="#8E8E8E" style="animation-duration:3.5s;animation-delay:2s"/>
  <circle class="s" cx="1050" cy="55" r="1.3" fill="#8E8E8E" style="animation-duration:4s;animation-delay:0.5s"/>
</svg>
